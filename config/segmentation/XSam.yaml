model: "XSam"
reasoning_model_path: null
device: "cuda"
use_gt_depth: false
save_results: true
max_query: 1
frame_subsample: 20
disable_vlm_judge: false
propagate_with_sam3: true
save_visualizations: false
sam3_propagation:
  device: "cuda"
  checkpoint_path: null
  bpe_path: null
  offload_video_to_cpu: false
xsam:
  code_root: "third_party/X-SAM/xsam"
  config_path: "xsam/configs/xsam/s3_mixed_finetune/xsam_phi3_mini_4k_instruct_siglip2_so400m_p14_384_sam_large_m2f_gpu16_mixed_finetune.py"
  checkpoint_path: "third_party/X-SAM/inits/X-SAM/s3_mixed_finetune/xsam_phi3_mini_4k_instruct_siglip2_so400m_p14_384_sam_large_m2f_gpu16_mixed_finetune/pytorch_model.bin"
  score_thr: 0.5
  max_query: 1
  prompt_template: "Can you segment <p>{PartDescription}</p> in this image? Please output the corresponding segmentation mask."
vlm_judge:
  role: "segmentation_judge"
  vlm_model: "gemini-2.5-flash"
  prompt_template: "Here are two images. The first image is the original image. I do segmentation on the first image, based on this text description: {PartDescription}. The result is shown in the second image, marked in green. Do you think the segmentation result in the second image is accurate or not. Please answer in this template: <answer>xxx</answer> <reason>yyy</reason> Substitute \"xxx\" with 'yes' or 'no' and \"yyy\" with the reason of your answer. DO NOT answer any other information."
  max_query: 3
