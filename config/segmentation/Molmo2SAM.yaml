model: "MolmoSAM"
reasoning_model_path: null
device: "cuda"
use_gt_depth: false
save_results: true
max_query: 1
frame_subsample: 20
disable_vlm_judge: false
propagate_with_sam3: true
save_visualizations: false
sam3_propagation:
  device: "cuda"
  checkpoint_path: null
  bpe_path: null
  offload_video_to_cpu: false
molmo:
  backend: "auto"
  vlm_model: "allenai/Molmo2-8B"
  point_scale: null
  prompt_template: "Point to the {PartDescription} in each frame. Return points in the format: <points coords=\"frame_id point_id x y; ...\"/> where x,y are in [0,{PointScale}]."
  max_query: 1
  max_new_tokens: 1024
  max_points_per_frame: 4
  sam3_confidence_threshold: 0.5
vlm_judge:
  role: "segmentation_judge"
  vlm_model: "gemini-2.5-flash"
  prompt_template: "Here are two images. The first image is the original image. I do segmentation on the first image, based on this text description: {PartDescription}. The result is shown in the second image, marked in green. Do you think the segmentation result in the second image is accurate or not. Please answer in this template: <answer>xxx</answer> <reason>yyy</reason> Substitute \"xxx\" with 'yes' or 'no' and \"yyy\" with the reason of your answer. DO NOT answer any other information."
  max_query: 3
